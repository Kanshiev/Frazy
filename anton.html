<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шутки для Антона</title>
    
    <style>
        body {
            margin: 0;
            min-height: 100dvh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            
            background-color: #e6f9ff; 
            background-image: url('kids_bg.png'); 
            background-size: repeat; 
            background-position: center;
            background-attachment: fixed; 
            
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', sans-serif;
            color: #333333;
            text-align: center;
            padding: 20px; 
            box-sizing: border-box;
            overflow: hidden;
            user-select: none; 
            position: relative; 
        }

        #counter {
            position: fixed;
            top: 20px;
            background: rgba(255, 255, 255, 0.7); 
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            color: #6a11cb;
            z-index: 10;
        }

        #bubble {
            background: linear-gradient(135deg, #00e6e6, #33ff33, #33ccff, #00e6e6);
            background-size: 800% 800%; 
            animation: textBgAnimation 30s linear infinite;

            border-radius: 40px;
            padding: 40px 30px;
            /* Уменьшили ширину, чтобы края не прилипали к экрану */
            width: 88%; 
            max-width: 500px;
            min-height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            border: 6px solid #ffffff; 
            cursor: pointer;
            position: relative;
            transition: transform 0.1s;
            z-index: 5;
        }

        #bubble:active {
            transform: scale(0.98);
        }

        #phrase-container {
            font-size: 2.2rem;
            line-height: 1.3;
            font-weight: bold;
            word-wrap: break-word;
            color: #333333; 
        }

        .nav-btn {
            position: fixed;
            bottom: 30px;
            background: #ffffff;
            border: 4px solid #ffffff; 
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            z-index: 100;
            -webkit-tap-highlight-color: transparent;
        }

        #prev-btn { left: 20px; }
        #next-btn { right: 20px; }
        
        #home-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            background: white;
            padding: 10px;
            border-radius: 50%;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 100;
        }

        @keyframes textBgAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @media (max-width: 768px) {
            #bubble { width: 90%; padding: 30px 20px; }
            #phrase-container { font-size: 1.8rem; }
            .nav-btn { width: 60px; height: 60px; bottom: 20px; }
        }
    </style>
</head>
<body>

    <a href="index.html" id="home-btn">🏠</a>
    <div id="counter">Загрузка...</div>

    <div id="bubble">
        <div id="phrase-container">Нажми, чтобы начать!</div>
    </div>

    <div id="prev-btn" class="nav-btn">⬅️</div>
    <div id="next-btn" class="nav-btn">➡️</div>

    <script>
        const container = document.getElementById('phrase-container');
        const counter = document.getElementById('counter');
        const bubble = document.getElementById('bubble');
        const nextBtn = document.getElementById('next-btn');
        const prevBtn = document.getElementById('prev-btn');

        let phrases = [];
        let currentIndex = 0;

        async function loadPhrases() {
            try {
                const response = await fetch('anton_phrases.json?t=' + new Date().getTime());
                phrases = await response.json();
                
                if (phrases.length > 0) {
                    // Рандомный старт: выбираем случайную шутку для начала!
                    let randomStart = Math.floor(Math.random() * phrases.length);
                    showPhrase(randomStart);
                }
            } catch (error) {
                container.innerText = "Ошибка загрузки 😢";
            }
        }

        function showPhrase(index) {
            if (index < 0) index = phrases.length - 1;
            if (index >= phrases.length) index = 0;
            
            currentIndex = index;
            
            container.style.opacity = 0;
            setTimeout(() => {
                container.innerText = phrases[currentIndex];
                container.style.opacity = 1;
                counter.innerText = `Шутка ${currentIndex + 1} из ${phrases.length}`;
            }, 100);
        }

        bubble.addEventListener('click', () => showPhrase(currentIndex + 1));
        nextBtn.addEventListener('click', () => showPhrase(currentIndex + 1));
        
        prevBtn.addEventListener('click', (e) => {
            e.stopPropagation(); 
            showPhrase(currentIndex - 1);
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') showPhrase(currentIndex + 1);
            if (e.key === 'ArrowLeft') showPhrase(currentIndex - 1);
        });

        loadPhrases();
    </script>

</body>
</html>
