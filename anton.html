<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Веселые шутки!</title>
    
    <style>
        body {
            margin: 0;
            min-height: 100dvh; 
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* Яркий детский фон */
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            background-size: 200% 200%;
            animation: funBg 10s ease infinite;
            
            /* Мультяшный шрифт */
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', sans-serif;
            color: #333333;
            text-align: center;
            padding: 20px; 
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Белый пузырь для текста */
        #bubble {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 40px 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 5px solid #ff9a9e;
        }

        .title {
            font-size: 1.5rem;
            color: #ff6a88;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }

        #phrase-container {
            font-size: 2rem;
            line-height: 1.4;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }

        /* КНОПКА ВОЗВРАТА */
        #back-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 2.5rem;
            text-decoration: none;
            transition: transform 0.2s;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3));
            z-index: 100;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #back-btn:active {
            transform: scale(0.85);
        }

        @keyframes funBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @media (max-width: 768px) {
            #bubble { padding: 30px 20px; border-width: 4px; }
            #phrase-container { font-size: 1.6rem; }
            #back-btn { font-size: 2.2rem; bottom: 15px; left: 15px; }
        }
    </style>
</head>
<body>

    <div id="bubble">
        <div class="title">✨ Шутка-Минутка ✨</div>
        <div id="phrase-container">ЗАГРУЗКА...</div>
    </div>

    <a href="index.html" id="back-btn" title="Вернуться">🔙</a>

    <script>
        const container = document.getElementById('phrase-container');
        let phrases = [];
        let lastIndex = -1;

        async function loadPhrases() {
            try {
                // Обращаемся к новому детскому файлу JSON!
                const response = await fetch('anton_phrases.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error("HTTP error " + response.status);
                phrases = await response.json();
                
                if (phrases.length > 0) {
                    setTimeout(changePhrase, 500);
                } else {
                    container.innerText = "Файлик пуст! :(";
                    container.style.opacity = 1; 
                }
            } catch (error) {
                console.error("Ошибка:", error);
                container.innerText = "Упс! Ошибка загрузки.";
                container.style.opacity = 1; 
            }
        }

        function changePhrase() {
            let randomIndex = Math.floor(Math.random() * phrases.length);
            while (randomIndex === lastIndex && phrases.length > 1) {
                randomIndex = Math.floor(Math.random() * phrases.length);
            }
            lastIndex = randomIndex;
            const text = phrases[randomIndex];
            
            container.style.opacity = 0;
            
            setTimeout(() => {
                container.innerText = text;
                container.style.opacity = 1;
                
                const wordsCount = text.split(' ').length;
                const displayTime = 4000 + (wordsCount * 500);
                
                setTimeout(changePhrase, displayTime);
            }, 800); 
        }

        loadPhrases();
    </script>

</body>
</html>
