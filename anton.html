<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шутки для Антона</title>
    
    <style>
        body {
            margin: 0;
            min-height: 100dvh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            background-size: 200% 200%;
            animation: funBg 10s ease infinite;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', sans-serif;
            color: #333333;
            text-align: center;
            padding: 20px; 
            box-sizing: border-box;
            overflow: hidden;
            user-select: none; /* Чтобы текст не выделялся при тапах */
        }

        /* Счетчик сверху */
        #counter {
            position: fixed;
            top: 20px;
            background: rgba(255, 255, 255, 0.5);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            color: #6a11cb;
        }

        /* Основной пузырь */
        #bubble {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: 40px 30px;
            width: 100%;
            max-width: 500px;
            min-height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 6px solid #ff9a9e;
            cursor: pointer;
            position: relative;
            transition: transform 0.1s;
        }

        #bubble:active {
            transform: scale(0.98);
        }

        #phrase-container {
            font-size: 2.2rem;
            line-height: 1.3;
            font-weight: bold;
            word-wrap: break-word;
        }

        /* Кнопки навигации */
        .nav-btn {
            position: fixed;
            bottom: 30px;
            background: #ffffff;
            border: 4px solid #ff6a88;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 100;
            -webkit-tap-highlight-color: transparent;
        }

        #prev-btn { left: 20px; }
        #next-btn { right: 20px; }
        
        /* Кнопка Домой */
        #home-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            background: white;
            padding: 10px;
            border-radius: 50%;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        @keyframes funBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @media (max-width: 768px) {
            #phrase-container { font-size: 1.8rem; }
            .nav-btn { width: 60px; height: 60px; bottom: 20px; }
        }
    </style>
</head>
<body>

    <a href="index.html" id="home-btn">🏠</a>
    <div id="counter">Загрузка...</div>

    <div id="bubble">
        <div id="phrase-container">Нажми, чтобы начать!</div>
    </div>

    <div id="prev-btn" class="nav-btn">⬅️</div>
    <div id="next-btn" class="nav-btn">➡️</div>

    <script>
        const container = document.getElementById('phrase-container');
        const counter = document.getElementById('counter');
        const bubble = document.getElementById('bubble');
        const nextBtn = document.getElementById('next-btn');
        const prevBtn = document.getElementById('prev-btn');

        let phrases = [];
        let currentIndex = 0;

        async function loadPhrases() {
            try {
                const response = await fetch('anton_phrases.json?t=' + new Date().getTime());
                phrases = await response.json();
                
                if (phrases.length > 0) {
                    showPhrase(0);
                }
            } catch (error) {
                container.innerText = "Ошибка загрузки 😢";
            }
        }

        function showPhrase(index) {
            if (index < 0) index = phrases.length - 1;
            if (index >= phrases.length) index = 0;
            
            currentIndex = index;
            
            // Анимация быстрой смены
            container.style.opacity = 0;
            setTimeout(() => {
                container.innerText = phrases[currentIndex];
                container.style.opacity = 1;
                counter.innerText = `Шутка ${currentIndex + 1} из ${phrases.length}`;
            }, 100);
        }

        // Клик по пузырю или правой кнопке - вперед
        bubble.addEventListener('click', () => showPhrase(currentIndex + 1));
        nextBtn.addEventListener('click', () => showPhrase(currentIndex + 1));
        
        // Клик по левой кнопке - назад
        prevBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Чтобы не срабатывал клик по родителю, если кнопки наложатся
            showPhrase(currentIndex - 1);
        });

        // Поддержка клавиатуры (стрелочки)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') showPhrase(currentIndex + 1);
            if (e.key === 'ArrowLeft') showPhrase(currentIndex - 1);
        });

        loadPhrases();
    </script>

</body>
</html>
