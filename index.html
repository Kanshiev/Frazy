<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор Фраз с Изюминкой</title>
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* Яркий, веселый градиент на фоне */
            background-image: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            background-size: cover;
            background-attachment: fixed;
            
            /* Основной цвет текста - белый */
            color: #ffffff; 
            
            /* Шрифт. Выбираем жирный serif (с засечками) для стиля демотиваторов */
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-weight: bold;
            
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }
        
        #phrase-container {
            font-size: 3rem; /* Увеличили размер для солидности */
            max-width: 90%;
            line-height: 1.2;
            
            /* Текст всегда в верхнем регистре (капс), как на мемах */
            text-transform: uppercase; 
            
            /* Немного увеличим межбуквенное расстояние */
            letter-spacing: 1px;

            /* МАГИЯ ЧЕРНОЙ РАМКИ (ОБВОДКИ) */
            /* Мы делаем 8 черных теней, сдвинутых во все стороны на 2px */
            text-shadow: 
                2px 2px 0 #000, 
               -2px -2px 0 #000, 
                2px -2px 0 #000, 
               -2px 2px 0 #000,
                0px 2px 0 #000,
                0px -2px 0 #000,
                2px 0px 0 #000,
                -2px 0px 0 #000,
                3px 3px 5px rgba(0,0,0,0.7); /* Дополнительная мягкая тень для объема */

            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        /* Адаптация для мобильных экранов */
        @media (max-width: 768px) {
            #phrase-container {
                font-size: 2.2rem; /* На телефоне чуть компактнее */
                max-width: 98%;
            }
        }
    </style>
</head>
<body>

    <div id="phrase-container">ЗАГРУЗКА...</div>

    <script>
        const container = document.getElementById('phrase-container');
        let phrases = [];
        let lastIndex = -1; // Переменная для запоминания прошлой фразы

        // Функция для загрузки фраз из JSON-файла
        async function loadPhrases() {
            try {
                // Добавляем ?t=... чтобы сбросить кэш браузера и всегда получать свежий файл
                const response = await fetch('phrases.json?t=' + new Date().getTime());
                phrases = await response.json();
                
                // Как только фразы загрузились, запускаем показ
                if (phrases.length > 0) {
                    setTimeout(changePhrase, 500);
                } else {
                    container.innerText = "ФАЙЛИК С ФРАЗАМИ ПУСТ :(";
                }
            } catch (error) {
                console.error("Ошибка загрузки фраз:", error);
                container.innerText = "НЕ УДАЛОСЬ ЗАГРУЗИТЬ ФРАЗЫ.";
            }
        }

        function changePhrase() {
            let randomIndex = Math.floor(Math.random() * phrases.length);
            
            // Проверяем, чтобы новая фраза не совпадала с предыдущей
            while (randomIndex === lastIndex && phrases.length > 1) {
                randomIndex = Math.floor(Math.random() * phrases.length);
            }
            
            // Запоминаем текущий индекс
            lastIndex = randomIndex;
            const text = phrases[randomIndex];
            
            // Прячем текущий текст
            container.style.opacity = 0;
            
            // Ждем завершения анимации затухания (1 секунда)
            setTimeout(() => {
                container.innerText = text; // Меняем текст
                container.style.opacity = 1;  // Показываем новый текст
                
                // Считаем время показа: 4 секунды базы + 500 мс на каждое слово
                const wordsCount = text.split(' ').length;
                const displayTime = 4000 + (wordsCount * 500);
                
                // Запускаем следующий цикл после того, как время вышло
                setTimeout(changePhrase, displayTime);
            }, 1000); 
        }

        // Запускаем процесс загрузки
        loadPhrases();
    </script>

</body>
</html>
