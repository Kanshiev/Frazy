<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор Фраз</title>
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        body {
            margin: 0;
            min-height: 100dvh; 
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000; 
            
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
            
            padding: 40px 20px; 
            box-sizing: border-box;
            overflow: hidden;
        }

        #demotivator-container {
            display: flex;
            flex-direction: column; 
            justify-content: space-between; 
            width: 100%;
            max-width: 600px; 
            height: auto;
            min-height: 80vh; 
        }

        .demo-text-top {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px; 
            
            text-shadow: 
                1px 1px 0 #000, -1px -1px 0 #000, 
                1px -1px 0 #000, -1px 1px 0 #000;
        }

        #inner-frame {
            flex-grow: 1; 
            border: 4px solid #ffffff; 
            padding: 30px 20px; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            
            background: linear-gradient(
                124deg, 
                #ff0000, #ff7f00, #ffff00, #00ff00, 
                #0000ff, #4b0082, #9400d3, #ff0000
            );
            background-size: 800% 800%;
            
            /* УВЕЛИЧИЛ ВРЕМЯ ДО 90 СЕКУНД ДЛЯ ОЧЕНЬ ПЛАВНОГО ГРАДИЕНТА */
            animation: rainbowAnimation 90s linear infinite;
            
            min-height: 250px; 
        }

        #phrase-container {
            font-size: 2.2rem;
            max-width: 95%;
            line-height: 1.3;
            text-transform: uppercase;
            letter-spacing: 1px;

            text-shadow: 
                2px 2px 0 #000, -2px -2px 0 #000, 
                2px -2px 0 #000, -2px 2px 0 #000,
                0px 2px 0 #000, 0px -2px 0 #000,
                2px 0px 0 #000, -2px 0px 0 #000,
                3px 3px 5px rgba(0,0,0,0.7);

            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .demo-text-bottom {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 25px; 
            color: #cccccc; 
            
            text-shadow: 
                1px 1px 0 #000, -1px -1px 0 #000, 
                1px -1px 0 #000, -1px 1px 0 #000;
        }

        @keyframes rainbowAnimation {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        @media (max-width: 768px) {
            #demotivator-container { min-height: 75vh; }
            .demo-text-top { font-size: 1.2rem; margin-bottom: 20px; }
            #inner-frame { padding: 25px 15px; }
            #phrase-container { font-size: 1.8rem; }
            .demo-text-bottom { font-size: 1rem; margin-top: 20px; }
        }
    </style>
</head>
<body>

    <div id="demotivator-container">
        <div class="demo-text-top">ФРАЗА ДНЯ</div>
        <div id="inner-frame">
            <div id="phrase-container">ЗАГРУЗКА...</div>
        </div>
        <div class="demo-text-bottom">СЛЕДУЮЩАЯ ЧЕРЕЗ ПАРУ СЕКУНД</div>
    </div>

    <script>
        const container = document.getElementById('phrase-container');
        let phrases = [];
        let lastIndex = -1;

        async function loadPhrases() {
            try {
                const response = await fetch('phrases.json?t=' + new Date().getTime());
                
                // Проверяем, успешен ли ответ сервера
                if (!response.ok) {
                    throw new Error("HTTP error " + response.status);
                }
                
                phrases = await response.json();
                
                if (phrases.length > 0) {
                    setTimeout(changePhrase, 500);
                } else {
                    container.innerText = "ФАЙЛИК ПУСТ :(";
                    container.style.opacity = 1; // Делаем ошибку видимой
                }
            } catch (error) {
                console.error("Ошибка загрузки фраз:", error);
                // Если JSON сломан, выводим сообщение
                container.innerText = "ОШИБКА В JSON! ПРОВЕРЬ ЗАПЯТЫЕ И СКОБКИ.";
                container.style.opacity = 1; // Делаем ошибку видимой
            }
        }

        function changePhrase() {
            let randomIndex = Math.floor(Math.random() * phrases.length);
            
            while (randomIndex === lastIndex && phrases.length > 1) {
                randomIndex = Math.floor(Math.random() * phrases.length);
            }
            
            lastIndex = randomIndex;
            const text = phrases[randomIndex];
            
            container.style.opacity = 0;
            
            setTimeout(() => {
                container.innerText = text;
                container.style.opacity = 1;
                
                const wordsCount = text.split(' ').length;
                const displayTime = 4000 + (wordsCount * 500);
                
                setTimeout(changePhrase, displayTime);
            }, 1000); 
        }

        loadPhrases();
    </script>

</body>
</html>
